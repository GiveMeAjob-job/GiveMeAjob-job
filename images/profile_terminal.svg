<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="banner_title banner_desc">
  <title id="banner_title">GiveMeAJob9 profile banner</title>
  <desc id="banner_desc">A terminal inspired banner showing focus areas, current status, and public learning mindset.</desc>
  <defs>
    <linearGradient id="banner_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="55%" stop-color="#0b1328" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="banner_line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <pattern id="banner_grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.35" />
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="30" fill="url(#banner_bg)" />
  <rect width="1200" height="320" rx="30" fill="url(#banner_grid)" />
  <circle cx="1070" cy="68" r="92" fill="#f97316" opacity="0.10" />
  <circle cx="1112" cy="252" r="116" fill="#14b8a6" opacity="0.08" />

  <rect x="28" y="28" width="1144" height="264" rx="24" fill="#0a1324" fill-opacity="0.90" stroke="#1f2b45" />
  <rect x="28" y="28" width="1144" height="44" rx="24" fill="#0f1a30" />
  <circle cx="60" cy="50" r="7" fill="#ef4444" />
  <circle cx="84" cy="50" r="7" fill="#f59e0b" />
  <circle cx="108" cy="50" r="7" fill="#22c55e" />
  <text x="140" y="55" fill="#94a3b8" font-size="15" font-family="SFMono-Regular,Consolas,Monaco,monospace">~/profile/landing-page</text>

  <text x="64" y="118" fill="white" font-size="46" font-weight="700" font-family="Segoe UI,Arial,sans-serif">GiveMeAJob9</text>
  <text x="64" y="150" fill="#cbd5e1" font-size="20" font-family="Segoe UI,Arial,sans-serif">Building in public with Python, problem solving, and visible progress.</text>
  <rect x="64" y="170" width="390" height="4" rx="2" fill="url(#banner_line)" />

  <text x="64" y="210" fill="#14b8a6" font-size="18" font-family="SFMono-Regular,Consolas,Monaco,monospace">$ focus</text>
  <text x="160" y="210" fill="#e2e8f0" font-size="18" font-family="Segoe UI,Arial,sans-serif">Python, algorithms, automation, cleaner presentation</text>

  <text x="64" y="242" fill="#14b8a6" font-size="18" font-family="SFMono-Regular,Consolas,Monaco,monospace">$ approach</text>
  <text x="190" y="242" fill="#e2e8f0" font-size="18" font-family="Segoe UI,Arial,sans-serif">Show progress consistently, then keep shipping better work</text>

  <text x="64" y="274" fill="#14b8a6" font-size="18" font-family="SFMono-Regular,Consolas,Monaco,monospace">$ status</text>
  <text x="170" y="274" fill="#e2e8f0" font-size="18" font-family="Segoe UI,Arial,sans-serif">Open to opportunities and collaboration</text>

  <rect x="812" y="96" width="288" height="44" rx="18" fill="#101b30" stroke="#1f2b45" />
  <text x="836" y="123" fill="#f8fafc" font-size="17" font-weight="700" font-family="Segoe UI,Arial,sans-serif">PUBLIC LEARNING</text>

  <rect x="812" y="154" width="288" height="44" rx="18" fill="#101b30" stroke="#1f2b45" />
  <text x="836" y="181" fill="#f8fafc" font-size="17" font-weight="700" font-family="Segoe UI,Arial,sans-serif">LEETCODE DASHBOARD</text>

  <rect x="812" y="212" width="288" height="44" rx="18" fill="#101b30" stroke="#1f2b45" />
  <text x="836" y="239" fill="#f8fafc" font-size="17" font-weight="700" font-family="Segoe UI,Arial,sans-serif">GITHUB ACTIONS AUTOMATION</text>
</svg>
