    </linearGradient>
  </defs>
  <rect x="474" y="190" width="386" height="60" rx="20" fill="#0c1729" stroke="#22314a" />
  <rect x="492" y="205" width="58" height="30" rx="15" fill="#101b30" stroke="#f97316" stroke-opacity="0.30" />
  <text x="521" y="224" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle" font-family="SFMono-Regular,Consolas,Monaco,monospace">MEDIUM</text>
  <text x="572" y="218" fill="#f8fafc" font-size="19" font-weight="700" font-family="Segoe UI,Arial,sans-serif">24 solved</text>
  <text x="572" y="237" fill="#91a3bd" font-size="13.5" font-family="Segoe UI,Arial,sans-serif">2,006 remaining of 2,030</text>
  <rect x="716" y="208" width="126" height="12" rx="6" fill="#152239" />
  <rect x="716" y="208" width="18.00" height="12" rx="6" fill="url(#medium_dashboard_gradient)" />
  <text x="842" y="238" fill="#f97316" font-size="16" font-weight="700" text-anchor="end" font-family="Segoe UI,Arial,sans-serif">1.18%</text>
    
  <defs>
    <linearGradient id="hard_dashboard_gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <rect x="474" y="268" width="386" height="60" rx="20" fill="#0c1729" stroke="#22314a" />
  <rect x="492" y="283" width="58" height="30" rx="15" fill="#101b30" stroke="#ec4899" stroke-opacity="0.30" />
  <text x="521" y="302" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle" font-family="SFMono-Regular,Consolas,Monaco,monospace">HARD</text>
  <text x="572" y="296" fill="#f8fafc" font-size="19" font-weight="700" font-family="Segoe UI,Arial,sans-serif">2 solved</text>
  <text x="572" y="315" fill="#91a3bd" font-size="13.5" font-family="Segoe UI,Arial,sans-serif">914 remaining of 916</text>
  <rect x="716" y="286" width="126" height="12" rx="6" fill="#152239" />
  <rect x="716" y="286" width="18.00" height="12" rx="6" fill="url(#hard_dashboard_gradient)" />
  <text x="842" y="316" fill="#ec4899" font-size="16" font-weight="700" text-anchor="end" font-family="Segoe UI,Arial,sans-serif">0.22%</text>
    
  <text x="474" y="354" fill="#7f91aa" font-size="12.5" font-family="Segoe UI,Arial,sans-serif">Color and layout are tuned for GitHub README rendering.</text>
