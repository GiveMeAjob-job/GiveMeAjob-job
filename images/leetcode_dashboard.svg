  <text x="572" y="159" fill="#91a3bd" font-size="13.5" font-family="Segoe UI,Arial,sans-serif">923 remaining of 933</text>
  <rect x="716" y="130" width="126" height="12" rx="6" fill="#152239" />
  <rect x="716" y="130" width="18.00" height="12" rx="6" fill="url(#easy_dashboard_gradient)" />
  <text x="842" y="160" fill="#84cc16" font-size="16" font-weight="700" text-anchor="end" font-family="Segoe UI,Arial,sans-serif">1.07%</text>
    
  <defs>
    <linearGradient id="medium_dashboard_gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
