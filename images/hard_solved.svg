  <text x="56" y="63" fill="white" font-size="28" font-weight="700" text-anchor="middle" font-family="SFMono-Regular,Consolas,Monaco,monospace">H</text>
  <text x="104" y="40" fill="#7dd3fc" font-size="11" font-weight="700" letter-spacing="1.2" font-family="SFMono-Regular,Consolas,Monaco,monospace">LIVE METRIC</text>
  <text x="104" y="66" fill="#f8fafc" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Hard</text>
  <rect x="346" y="24" width="70" height="30" rx="15" fill="#101a2d" stroke="#ec4899" stroke-opacity="0.45" />
