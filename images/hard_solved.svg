  <text x="104" y="104" fill="#ffffff" font-size="32" font-weight="700" font-family="Segoe UI,Arial,sans-serif">2</text>
  <text x="184" y="104" fill="#94a3b8" font-size="18" font-family="Segoe UI,Arial,sans-serif">/ 926</text>
